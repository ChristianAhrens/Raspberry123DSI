pcm.dante16 {
    type plug
    slave {
        pcm "hw:Dante24290649,0"
        channels 32
        rate 48000
        format S32_LE
    }
    ttable {
        # input channel (slave side) -> output channel (app side)
        # format: ttable.SLAVE_CH.APP_CH = gain
        0.0   1
        1.1   1
        2.2   1
        3.3   1
        4.4   1
        5.5   1
        6.6   1
        7.7   1
        8.8   1
        9.9   1
        10.10 1
        11.11 1
        12.12 1
        13.13 1
        14.14 1
        15.15 1
    }
}

ctl.dante16 {
    type hw
    card Dante24290649
}
